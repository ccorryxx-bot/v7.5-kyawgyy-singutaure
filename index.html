<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyaw Gyi Signature V 7.8 - Multi-Copy Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --emerald: #10b981;
            --blue: #3b82f6;
            --bg: #020617;
        }

        body { 
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-m89 {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .btn-9w {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #10b981, #60a5fa, #f472b6, #10b981);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 6s infinite linear;
        }

        @keyframes shimmer {
            to { background-position: 300% center; }
        }

        .copy-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .copy-pill:active {
            background: #10b981;
            color: black;
            transform: scale(0.9);
        }

        .log-enter {
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen pb-40">

<div class="max-w-lg mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
        <p class="text-[9px] text-emerald-400 font-extrabold uppercase tracking-[0.5em] mb-3">Kyaw Gyi Signature V 7.8</p>
        <h1 class="text-4xl font-black tracking-tighter uppercase italic shimmer-text">VIP GEN</h1>
        <p class="text-slate-500 text-[8px] font-bold tracking-[0.2em] uppercase opacity-60 mt-2 italic">Individual Copy Update | M89 Expert</p>
    </div>

    <!-- Input Area -->
    <div class="glass-panel rounded-[2.5rem] p-6 mb-8">
        <div class="flex justify-between items-center mb-4 px-2">
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Phone Database</span>
            <button onclick="clearAll()" class="text-[10px] text-red-500/70 font-black uppercase tracking-widest">Reset</button>
        </div>
        
        <textarea id="phoneInput" rows="4" 
            class="w-full bg-black/40 border border-slate-800 rounded-[1.5rem] p-6 text-emerald-50 outline-none transition-all font-mono text-sm resize-none no-scrollbar focus:border-emerald-500/30"
            placeholder="ဖုန်းနံပါတ်များ..."></textarea>
        
        <div class="grid grid-cols-2 gap-4 mt-6">
            <button onclick="generate('m89')" class="btn-m89 text-black font-black py-5 rounded-[1.2rem] text-[11px] tracking-widest uppercase active:scale-95">
                M89.VIP 🔱
            </button>
            <button onclick="generate('9w')" class="btn-9w text-white font-black py-5 rounded-[1.2rem] text-[11px] tracking-widest uppercase active:scale-95 border-t border-white/10">
                9W.VIP 💎
            </button>
        </div>
    </div>

    <div id="toolbar" class="hidden flex items-center justify-between mb-6 px-6">
        <span id="count" class="text-2xl font-black text-white">0 Logs</span>
        <button onclick="copyAll()" class="px-6 py-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all">Copy All</button>
    </div>

    <div id="outputList" class="space-y-12"></div>
</div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-12 py-3 rounded-full font-black text-[9px] opacity-0 transition-all duration-500 pointer-events-none uppercase tracking-widest z-50 shadow-2xl">
    Success Copied
</div>

<script>
    const letters = "abcdefghkmnpstuvwxyz";
    const numbers = "23456789";
    
    const config = {
        m89: { 
            link: "*https://tinyurl.com/FreeTokenBonusBadage*", 
            prefix: "m89",
        },
        '9w': { 
            link: "*https://tinyurl.com/MinatwatBonusSpwdohhh*", 
            prefix: "9w",
        }
    };
    
    let logs = [];

    const rnd = (len, pool) => {
        let r = "";
        for(let i=0; i<len; i++) r += pool.charAt(Math.floor(Math.random() * pool.length));
        return r;
    };

    const generateCreds = (type) => {
        const p = config[type].prefix;
        const user = type === 'm89' 
            ? p + rnd(1, letters) + rnd(2, numbers)
            : p + rnd(2, letters) + rnd(2, numbers);
        return { user: user, pass: rnd(3, letters) + rnd(3, numbers) };
    };

    const formatPhone = (v) => {
        let n = v.replace(/\D/g, '');
        if (n.startsWith('959')) n = n.substring(3);
        else if (n.startsWith('09')) n = n.substring(2);
        else if (n.startsWith('9')) n = n.substring(1);
        return '9 ' + n;
    };

    const clearAll = () => {
        document.getElementById('phoneInput').value = "";
        document.getElementById('outputList').innerHTML = "";
        document.getElementById('toolbar').classList.add('hidden');
        logs = [];
    };

    const generate = (type) => {
        const input = document.getElementById('phoneInput').value;
        const list = document.getElementById('outputList');
        const lines = input.split('\n').map(l => l.trim()).filter(l => l !== "");
        if (!lines.length) return;

        list.innerHTML = "";
        logs = [];
        document.getElementById('toolbar').classList.remove('hidden');
        document.getElementById('count').innerText = lines.length + " Logs";

        lines.forEach((line, i) => {
            const phone = formatPhone(line);
            const creds = generateCreds(type);
            logs.push({ ...creds, phone, type });

            const div = document.createElement('div');
            div.className = "log-enter space-y-4";
            div.style.animationDelay = (i * 0.05) + "s";
            
            if (type === 'm89') {
                div.innerHTML = `
                <div class="glass-panel rounded-[2rem] p-7 border border-white/5 space-y-6">
                    <!-- Format 1: Game Link -->
                    <div class="p-5 bg-white/5 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-emerald-400 font-black uppercase mb-3 tracking-widest">#1 Link Format</p>
                        <div class="font-mono text-[13px] space-y-2 text-slate-300">
                            <p>*လက်ဆောင်ကုဒ်🎁*</p>
                            <p>━━━━━━━━━</p>
                            <p class="text-white font-bold italic">_အော်တိုဝင်ဆော့ လိုက်ပါ။<br>ဂိမ်းဆော့ဝဲလ် ဒေါင်းစရာ မလို။_</p>
                            <p class="text-white font-bold italic">*တိုက်ရိုက်လင့် 👇*</p>
                            <p class="text-emerald-400 break-all underline decoration-emerald-500/30 underline-offset-4">${config.m89.link}</p>
                        </div>
                        <button onclick="copyM89Link(event)" class="w-full mt-5 py-3.5 bg-emerald-500/10 hover:bg-emerald-500 hover:text-black text-emerald-400 border border-emerald-500/20 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] transition-all">Copy Link Layout 📋</button>
                    </div>

                    <!-- Format 2: Account -->
                    <div class="p-5 bg-white/5 rounded-2xl border border-white/5">
                        <p class="text-[10px] text-blue-400 font-black uppercase mb-4 tracking-widest">#2 Account Format</p>
                        <div class="font-mono text-[13px] space-y-6 text-slate-300">
                            <div>
                                <p>account.</p>
                                <p>━━━━</p>
                            </div>
                            
                            <div class="space-y-4">
                                <div class="flex items-center justify-between group">
                                    <p>အမည်     __  <span class="text-white font-black text-base">${creds.user}</span></p>
                                    <button onclick="copyText('${creds.user}', event)" class="copy-pill px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-wider">Copy Name</button>
                                </div>
                                
                                <div class="flex items-center justify-between group">
                                    <p>စကားဝှက်  __  <span class="text-white font-black text-base">${creds.pass}</span></p>
                                    <button onclick="copyText('${creds.pass}', event)" class="copy-pill px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-wider">Copy Pass</button>
                                </div>
                                
                                <div class="flex items-center justify-between group">
                                    <p>နံပါတ်  __  <span class="text-emerald-400 font-black text-base">${phone}</span></p>
                                    <button onclick="copyText('${phone}', event)" class="copy-pill px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-wider">Copy Num</button>
                                </div>
                            </div>
                        </div>
                        <button onclick="copyM89Acc('${creds.user}', '${creds.pass}', '${phone}', event)" class="w-full mt-6 py-4 bg-blue-500/10 hover:bg-blue-500 hover:text-black text-blue-400 border border-blue-500/20 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] transition-all">Copy Full Account Layout 📋</button>
                    </div>
                </div>`;
            } else {
                div.innerHTML = `
                <div class="glass-panel rounded-[2rem] p-7 border border-white/5 space-y-4">
                    <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">9W.VIP Layout</p>
                    <div class="font-mono text-[13px] space-y-3">
                        <p class="text-blue-400 font-bold italic">*${config['9w'].link}* 📌</p>
                        <p>အမည်      __  <span class="text-white font-black">${creds.user}</span></p>
                        <p>ပက်စဝှက်  __  <span class="text-white font-black">${creds.pass}</span></p>
                        <p>ဖုန်းနံပါတ်  __  <span class="text-emerald-400 font-black">${phone}</span></p>
                        <p class="text-white font-bold italic">*လင့် ထဲမှာနော် ဖရီး ဘောနပ် ။😽*</p>
                    </div>
                    <button onclick="copy9W('${creds.user}', '${creds.pass}', '${phone}', event)" class="w-full py-4 bg-white/5 hover:bg-blue-500 hover:text-black border border-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Copy Full Layout 📋</button>
                </div>`;
            }
            list.appendChild(div);
        });
        window.scrollTo({ top: document.getElementById('toolbar').offsetTop - 30, behavior: 'smooth' });
    };

    const copyM89Link = (e) => {
        const text = `လက်ဆောင်ကုဒ်🎁\n━━━━━━━━━\n\n*အော်တိုဝင်ဆော့ လိုက်ပါ။\nဂိမ်းဆော့ဝဲလ်  ဒေါင်းစရာ မလို။*\n\n*တိုက်ရိုက်လင့် 👇*\n\n${config.m89.link}`;
        copyText(text, e);
    };

    const copyM89Acc = (u, p, ph, e) => {
        const text = `အကောင့်\n━━━━\n\n\nအမည်     __  ${u}\n\nစကားဝှက်  __  ${p}\n\nနံပါတ်  __  ${ph}`;
        copyText(text, e);
    };

    const copy9W = (u, p, ph, e) => {
        const text = `လင့်ခ် 👇\n*${config['9w'].link}* 📌\n━━━━━━━━━━━━━\n\n\nအမည်      __  ${u}\n\nပက်စဝှက်  __  ${p}\n\nဖုန်းနံပါတ်  __  ${ph}\n\n\n*လင့် ထဲမှာနော် ဖရီး ဘောနပ် ။😽*`;
        copyText(text, e);
    };

    const copyText = (t, e) => {
        if(e) e.stopPropagation();
        const el = document.createElement('textarea');
        el.value = t;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        const toast = document.getElementById('toast');
        toast.style.opacity = "1";
        toast.style.transform = "translate(-50%, -10px)";
        setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translate(-50%, 0)"; }, 1200);
    };

    const copyAll = () => {
        if (!logs.length) return;
        let out = "";
        logs.forEach((log, i) => {
            if (log.type === 'm89') {
                out += `[LINK]\n*လက်ဆောင်ကုဒ်🎁*\n━━━━━━━━━\n\n_အော်တိုဝင်ဆော့ လိုက်ပါ။\nဂိမ်းဆော့ဝဲလ်  ဒေါင်းစရာ မလို။_\n\n*တိုက်ရိုက်လင့် 👇*\n\n${config.m89.link}\n\n[ACCOUNT]\nအကောင့်\n━━━━\n\n\nအမည်     __  ${log.user}\n\nစကားဝှက်  __  ${log.pass}\n\nနံပါတ်  __  ${log.phone}`;
            } else {
                out += `လင့်ခ် 👇\n*${config['9w'].link}* 📌\n━━━━━━━━━━━━━\n\n\nအမည်      __  ${log.user}\n\nပက်စဝှက်  __  ${log.pass}\n\nဖုန်းနံပါတ်  __  ${log.phone}\n\n\n*လင့် ထဲမှာနော် ဖရီး ဘောနပ် ။😽*`;
            }
            if (i < logs.length - 1) out += `\n\n====================\n\n`;
        });
        copyText(out);
    };
</script>

</body>
</html>
