<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyaw Gyi Signature V 10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #020617;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .shimmer-text {
            background: linear-gradient(90deg, #10b981, #60a5fa, #f472b6, #10b981);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .log-card {
            will-change: auto;
        }

        .copy-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.1s ease;
        }

        .copy-pill:active {
            background: #10b981;
            color: black;
            transform: scale(0.9);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .tab-btn { transition: all 0.2s ease; }
        .tab-btn.active-gen { 
            background: linear-gradient(135deg, #10b981, #059669);
            color: black;
        }
        .tab-btn.active-hist {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
        }

        .hist-card {
            animation: slideIn 0.25s ease-out forwards;
            opacity: 0;
        }

        .day-group {
            border-left: 2px solid rgba(99, 102, 241, 0.3);
            padding-left: 12px;
        }

        .expand-btn { transition: transform 0.2s ease; }
        .expand-btn.open { transform: rotate(180deg); }

        /* Mini Calendar */
        .cal-day {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            font-size: 10px; font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }
        .cal-day:hover:not(.cal-empty):not(.cal-future) { background: rgba(255,255,255,0.08); }
        .cal-day.cal-future { color: #334155; cursor: default; }
        .cal-day.cal-empty { cursor: default; }
        .cal-day.cal-has-data::after {
            content: '';
            position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; border-radius: 50%;
            background: #10b981;
        }
        .cal-day.range-start, .cal-day.range-end {
            background: #6366f1 !important;
            color: white !important;
        }
        .cal-day.range-mid {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 0;
            color: #a5b4fc;
        }
        .cal-day.range-start { border-radius: 8px 0 0 8px; }
        .cal-day.range-end { border-radius: 0 8px 8px 0; }
        .cal-day.range-start.range-end { border-radius: 8px; }
        .cal-day.cal-today { color: #10b981; font-weight: 900; }

        .cal-popup {
            animation: fadeUp 0.2s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen pb-32">

<div class="max-w-lg mx-auto">
    <!-- Header -->
    <div class="text-center mb-6">
        <p class="text-[9px] text-emerald-400 font-extrabold uppercase tracking-[0.4em] mb-2">Kyaw Gyi Signature V 10.0</p>
        <h1 class="text-4xl font-black italic shimmer-text tracking-tighter uppercase">VIP ENGINE</h1>
        <p class="text-slate-500 text-[8px] font-bold tracking-widest uppercase opacity-60 mt-2 italic">V10.0 | Full Update</p>

    <!-- Tab Switcher -->

    <!-- GENERATE TAB -->

            <div class="grid grid-cols-2 gap-4 mt-6">

                    9W.VIP 💎

            </div>
            <div class="mt-3">
                <button onclick="generate('rng')" class="w-full bg-gradient-to-br from-violet-500/20 to-fuchsia-500/20 border border-violet-500/30 text-violet-300 font-black py-3 rounded-xl text-[10px] tracking-widest uppercase active:scale-95 transition-transform">

            </div>
            <div class="mt-3">
                <button onclick="generate('m89app')" class="w-full bg-gradient-to-br from-orange-500/20 to-amber-500/20 border border-orange-500/30 text-orange-300 font-black py-3 rounded-xl text-[10px] tracking-widest uppercase active:scale-95 transition-transform">
                    📱 M89.For App
                </button>
            </div>

            <!-- Session Live Counter -->
            <div id="sessionStats" class="hidden mt-4 grid grid-cols-3 gap-2">
                <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 text-center">
                    <p class="text-lg font-black text-emerald-400" id="sesM89">0</p>
                    <p class="text-[7px] text-slate-500 font-bold uppercase tracking-wider mt-0.5">M89</p>
                </div>
                <div class="bg-blue-500/10 border border-blue-500/20 rounded-xl p-3 text-center">
                    <p class="text-lg font-black text-blue-400" id="ses9W">0</p>

                <div class="bg-violet-500/10 border border-violet-500/20 rounded-xl p-3 text-center">
                    <p class="text-lg font-black text-violet-400" id="sesRNG">0</p>

            </div>
        </div>

        <div id="toolbar" class="hidden items-center justify-between mb-6 px-4">
            <span id="count" class="text-2xl font-black text-white">0 Logs</span>
            <button onclick="copyAll()" class="px-6 py-3 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-full text-[10px] font-black uppercase tracking-widest">Copy All</button>
        </div>

        <div id="outputList" class="space-y-12"></div>
    </div>

    <!-- HISTORY TAB -->
    <div id="histTab" class="hidden">
        <!-- Stats Bar -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="glass-panel rounded-2xl p-4 text-center">
                <p class="text-2xl font-black text-emerald-400" id="statTotal">0</p>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-wider mt-1">Total</p>
            </div>
            <div class="glass-panel rounded-2xl p-4 text-center">
                <p class="text-2xl font-black text-emerald-400" id="statToday">0</p>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-wider mt-1">Today</p>
            </div>
            <div class="glass-panel rounded-2xl p-4 text-center">
                <p class="text-2xl font-black text-slate-300" id="statDays">0</p>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-wider mt-1">Days</p>
            </div>
        </div>

        <!-- Clear History Button -->
        <div class="flex justify-end mb-4">
            <button onclick="clearHistory()" class="text-[9px] text-red-500/60 font-black uppercase tracking-widest px-4 py-2 rounded-lg border border-red-500/10 hover:border-red-500/30">
                🗑 Clear All History
            </button>
        </div>

        <!-- Type Filter Tabs -->
        <div class="flex gap-2 mb-4">
            <button onclick="setTypeFilter('all')" id="tf-all" class="type-filter-btn relative flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-wider border">All<span id="tc-all" style="display:none;position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 3px;background:#94a3b8;color:#000;font-size:7px;font-weight:900;border-radius:99px;align-items:center;justify-content:center;pointer-events:none"></span></button>
            <button onclick="setTypeFilter('m89')" id="tf-m89" class="type-filter-btn relative flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-wider border">M89<span id="tc-m89" style="display:none;position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 3px;background:#34d399;color:#000;font-size:7px;font-weight:900;border-radius:99px;align-items:center;justify-content:center;pointer-events:none"></span></button>
            <button onclick="setTypeFilter('9w')" id="tf-9w" class="type-filter-btn relative flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-wider border">9W<span id="tc-9w" style="display:none;position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 3px;background:#60a5fa;color:#000;font-size:7px;font-weight:900;border-radius:99px;align-items:center;justify-content:center;pointer-events:none"></span></button>
            <button onclick="setTypeFilter('rng')" id="tf-rng" class="type-filter-btn relative flex-1 py-2 rounded-xl text-[9px] font-black uppercase tracking-wider border">RNG<span id="tc-rng" style="display:none;position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 3px;background:#a78bfa;color:#000;font-size:7px;font-weight:900;border-radius:99px;align-items:center;justify-content:center;pointer-events:none"></span></button>
        </div>

        <!-- Date Range Picker -->
        <div class="glass-panel rounded-2xl p-4 mb-4 relative">
            <div class="flex items-center justify-between mb-3">
                <span class="text-[9px] text-slate-400 font-black uppercase tracking-widest">📅 ရက်ချိန်ကြား ရွေးရန်</span>
                <button onclick="clearDateFilter()" id="clearFilterBtn" class="hidden text-[8px] text-indigo-400 font-black uppercase tracking-widest">✕ Reset</button>
            </div>
            <!-- Selected Range Display -->
            <div class="flex items-center gap-2 mb-3">
                <div id="dateFromDisplay" onclick="openCal('from')" class="flex-1 bg-black/40 border border-slate-700 rounded-xl px-3 py-2 text-center cursor-pointer hover:border-indigo-500/40 transition-colors">
                    <p class="text-[8px] text-slate-500 font-bold uppercase">From</p>
                    <p id="dateFromLabel" class="text-[11px] text-white font-black mt-0.5">—</p>
                </div>
                <span class="text-slate-600 font-black text-xs">→</span>
                <div id="dateToDisplay" onclick="openCal('to')" class="flex-1 bg-black/40 border border-slate-700 rounded-xl px-3 py-2 text-center cursor-pointer hover:border-indigo-500/40 transition-colors">
                    <p class="text-[8px] text-slate-500 font-bold uppercase">To</p>
                    <p id="dateToLabel" class="text-[11px] text-white font-black mt-0.5">—</p>
                </div>
                <button onclick="applyDateFilter()" id="applyFilterBtn" class="hidden px-4 py-3 bg-indigo-500/20 border border-indigo-500/30 text-indigo-400 rounded-xl text-[8px] font-black uppercase tracking-widest">Go</button>
            </div>

            <!-- Mini Calendar Popup -->
            <div id="calPopup" class="hidden cal-popup bg-[#0f172a] border border-white/10 rounded-2xl p-3 shadow-2xl">

                    <button onclick="calPrev()" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white/5 text-slate-400 font-black">‹</button>
                    <span id="calMonthLabel" class="text-[10px] text-white font-black uppercase tracking-widest"></span>
                    <button onclick="calNext()" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white/5 text-slate-400 font-black">›</button>
                </div>
                <div class="grid grid-cols-7 gap-0.5 mb-1">
                    <div class="cal-day cal-empty text-slate-600">S</div>
                    <div class="cal-day cal-empty text-slate-600">M</div>
                    <div class="cal-day cal-empty text-slate-600">T</div>
                    <div class="cal-day cal-empty text-slate-600">W</div>
                    <div class="cal-day cal-empty text-slate-600">T</div>
                    <div class="cal-day cal-empty text-slate-600">F</div>
                    <div class="cal-day cal-empty text-slate-600">S</div>

                <div id="calGrid" class="grid grid-cols-7 gap-0.5"></div>

<!-- Toast Notification -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-10 py-3 rounded-full font-black text-[10px] opacity-0 transition-all duration-300 pointer-events-none uppercase tracking-widest z-50 shadow-2xl">
    Copied!
</div>

<script>
    const letters = "abcdefghkmnpstuvwxyz";
    const numbers = "23456789";
    
    const config = {
        m89: { link: "https://tinyurl.com/M89FreeBonusLimitedTimeRewards", prefix: "m89" },
        m89app: { link: "https://tinyurl.com/M89BuzzActivateYourBonusV2", prefix: "m89" },
        '9w': { link: "https://tinyurl.com/DawNwayWadiCOMM", prefix: "9w" }
    };
    
    let logs = [];
    let sessionCount = { m89: 0, '9w': 0, rng: 0, m89app: 0 };

    const updateSessionStats = () => {
        const el = document.getElementById('sessionStats');
        el.classList.remove('hidden');
        document.getElementById('sesM89').textContent = sessionCount['m89'];
        document.getElementById('ses9W').textContent  = sessionCount['9w'];
        document.getElementById('sesRNG').textContent = sessionCount['rng'];
    };

    // ─── Unique Set (persistent, separate from history) ──────────
    const USED_KEY = 'kyawgyi_used_v1';
    const usedSet = new Set();

    const loadUsedFromDB = () => {
        // Load from history DB
        const db = getDB();
        Object.values(db).forEach(entries => {
            entries.forEach(e => { usedSet.add(e.user); usedSet.add(e.pass); });
        });
        // Load from persistent usedKeys (survives history clear)
        try {
            const saved = JSON.parse(localStorage.getItem(USED_KEY)) || [];
            saved.forEach(k => usedSet.add(k));
        } catch {}
    };

    const persistUsed = (keys) => {
        try {
            const existing = JSON.parse(localStorage.getItem(USED_KEY)) || [];
            const merged = [...new Set([...existing, ...keys])];
            localStorage.setItem(USED_KEY, JSON.stringify(merged));
        } catch {}
    };

    const rnd = (len, pool) => {
        let r = "";
        for(let i = 0; i < len; i++) r += pool.charAt(Math.floor(Math.random() * pool.length));
        return r;
    };

    const uniqueUser = (type) => {
        let u, tries = 0;
        do {
            if (type === 'm89') u = 'm89' + rnd(1, letters) + rnd(2, numbers);
            else if (type === '9w') u = '9w' + rnd(2, letters) + rnd(2, numbers);
            else if (type === 'm89app') u = 'm89' + rnd(1, letters) + rnd(2, numbers);
            else u = 'm89' + rnd(2, letters) + rnd(2, numbers);
            tries++;
        } while (usedSet.has(u) && tries < 500);
        usedSet.add(u);
        return u;
    };

    const uniquePass = () => {
        let p, tries = 0;
        do {
            p = rnd(3, letters) + rnd(3, numbers);
            tries++;
        } while (usedSet.has(p) && tries < 500);
        usedSet.add(p);
        return p;
    };

    // ─── DB Helpers ───────────────────────────────────────────────
    const DB_KEY = 'kyawgyi_db_v1';

    const getDB = () => {
        try { return JSON.parse(localStorage.getItem(DB_KEY)) || {}; }
        catch { return {}; }
    };

    const saveDB = (db) => localStorage.setItem(DB_KEY, JSON.stringify(db));

    const todayKey = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const formatDisplayDate = (key) => {
        const [y, m, d] = key.split('-');
        const today = todayKey();
        const yesterday = (() => {
            const dt = new Date(); dt.setDate(dt.getDate()-1);
            return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        })();
        if (key === today) return '📅 Today — ' + key;
        if (key === yesterday) return '⬅️ Yesterday — ' + key;
        return '🗓 ' + key;
    };

    const saveToHistory = (entries) => {
        const db = getDB();
        const day = todayKey();
        if (!db[day]) db[day] = [];
        entries.forEach(e => db[day].push(e));
        saveDB(db);
    };

    // Load used names/passes from history into Set on startup
    // (init moved after tfStyles declaration below)

    // ─── Utils ────────────────────────────────────────────────────
    const formatPhone = (v) => {
        let n = v.replace(/\D/g, '');
        if (n.startsWith('959')) n = n.substring(3);
        else if (n.startsWith('09')) n = n.substring(2);
        else if (n.startsWith('9')) n = n.substring(1);
        return '9 ' + n;
    };

    // ─── Calendar & Date Filter ───────────────────────────────────
    let calTarget = null;
    let calYear, calMonth;
    let filterFrom = null, filterTo = null;
    let typeFilter = 'all';

    const updateTypeCounts = (db) => {
        const allEntries = Object.values(db).flat();
        const counts = { all: allEntries.length, m89: 0, '9w': 0, rng: 0 };
        allEntries.forEach(e => { if (counts[e.type] !== undefined) counts[e.type]++; });
        ['all','m89','9w','rng'].forEach(k => {
            const badge = document.getElementById('tc-' + k);
            if (!badge) return;
            badge.textContent = counts[k];
            badge.style.display = counts[k] > 0 ? 'inline-flex' : 'none';
        });
    };

    const tfColors = {
        all:  { on: ['rgba(248,250,252,0.15)', '#f8fafc', 'rgba(248,250,252,0.3)'],  off: ['rgba(255,255,255,0.04)', '#64748b', 'rgba(255,255,255,0.05)'] },
        m89:  { on: ['rgba(16,185,129,0.2)',   '#34d399', 'rgba(16,185,129,0.4)'],   off: ['rgba(255,255,255,0.04)', '#64748b', 'rgba(255,255,255,0.05)'] },
        '9w': { on: ['rgba(59,130,246,0.2)',   '#60a5fa', 'rgba(59,130,246,0.4)'],   off: ['rgba(255,255,255,0.04)', '#64748b', 'rgba(255,255,255,0.05)'] },
        rng:  { on: ['rgba(139,92,246,0.2)',   '#a78bfa', 'rgba(139,92,246,0.4)'],   off: ['rgba(255,255,255,0.04)', '#64748b', 'rgba(255,255,255,0.05)'] },
    };

    const applyTfColor = (k, active) => {
        const btn = document.getElementById('tf-' + k);
        if (!btn) return;
        const [bg, color, border] = tfColors[k][active ? 'on' : 'off'];
        btn.style.background = bg;
        btn.style.color = color;
        btn.style.borderColor = border;
    };

    const setTypeFilter = (t) => {
        typeFilter = t;
        ['all','m89','9w','rng'].forEach(k => applyTfColor(k, k === t));
        renderHistory();
    };

    // ─── Init (run after all functions declared) ─────────────────
    window.addEventListener('load', () => {
        loadUsedFromDB();
        ['all','m89','9w','rng'].forEach(k => applyTfColor(k, k === 'all'));
    });

    const dateKey = (y, m, d) => `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const openCal = (target) => {
        calTarget = target;
        const popup = document.getElementById('calPopup');
        const isOpen = !popup.classList.contains('hidden');
        if (isOpen && calTarget === target) { popup.classList.add('hidden'); return; }
        const now = new Date();
        const ref = target === 'from' && filterFrom ? new Date(filterFrom + 'T00:00:00')
                  : target === 'to'   && filterTo   ? new Date(filterTo   + 'T00:00:00')
                  : now;
        calYear = ref.getFullYear(); calMonth = ref.getMonth();
        renderCal();
        popup.classList.remove('hidden');
    };

    const renderCal = () => {
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        document.getElementById('calMonthLabel').textContent = `${months[calMonth]} ${calYear}`;
        const grid = document.getElementById('calGrid');
        grid.innerHTML = '';
        const db = getDB();
        const dbKeys = Object.keys(db);
        const today = todayKey();
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

        // blank cells
        for (let i = 0; i < firstDay; i++) {
            const blank = document.createElement('div');
            blank.className = 'cal-day cal-empty';
            grid.appendChild(blank);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const key = dateKey(calYear, calMonth + 1, d);
            const el = document.createElement('div');
            el.className = 'cal-day';
            el.textContent = d;
            if (key > today) { el.classList.add('cal-future'); }
            else {
                if (dbKeys.includes(key)) el.classList.add('cal-has-data');
                if (key === today) el.classList.add('cal-today');
                // range highlight
                if (filterFrom && filterTo) {
                    if (key === filterFrom) el.classList.add('range-start');
